name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-validation:
    name: Repository validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate lab structure
        run: bash ./scripts/validate-lab.sh

      - name: Check boundary statements
        run: bash ./scripts/check-boundaries.sh

      - name: Check markdown code fences
        run: bash ./scripts/check-markdown-fences.sh

      - name: Check AI workflow boundaries
        run: bash ./scripts/check-ai-boundaries.sh

      - name: Check lab registry
        run: bash ./scripts/check-registry.sh
