name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-validation:
    name: Repository validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate lab structure
        run: ./scripts/validate-lab.sh

      - name: Check boundary statements
        run: ./scripts/check-boundaries.sh
